<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="papertree.css">
        <link href=' http://fonts.googleapis.com/css?family=Droid+Sans' rel='stylesheet' type='text/css'>
        <script type="text/javascript" src="classes.js" defer></script>
        <script type="text/javascript" src="papertree.js" defer></script>
    </head>

    <body>
        <div class="fillout horzflex">
            <div class="fillout leftside"> <!--Left Div-->
                <div class="fillout inner-body minimap">
                    
                </div>
                <div class="fillout inner-body sidebar">
                    
                </div>
            </div>
            <div class="fillout rightside"> <!--Right Div-->
                <div class="fillout inner-body main">
                    <div class="editDiv" id="display">
                        <h2 id="title">Papertree</h2>
                        <button id="editButton"><img src="edit-icon.svg"/></button>
                        <div class="scrollable">
                            <p id="body">hi! </p>
                        </div>
                    </div>
                    <div class="editDiv" id="edit">
                        <input class="titleEditor" type="text" id="titleEditor"> <br/>
                        <button id="saveButton"><img src="save-icon.svg"/></button>
                        <div tabindex class="scrollable editable">
                            <p><span id="bodyEditor" class="textarea" role="textbox" contenteditable></span></p>
                        </div>
                    </div>
                </div>
                <div class="fillout inner-body link" id="linkdiv">
                    <div id="newPageLink" class="linkSection">
                        <p>
                            <span id="newLinkName" class="textarea centerContent halfEmRight" role="textbox" contenteditable></span>
                            <select id="newLinkTarget" class="halfEmRight"><option value = -1>New Page</option></select>
                            <button onclick=onNewPageClick() class="noPad"><img class="smallImg"src="plus-icon.svg"/></button>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
